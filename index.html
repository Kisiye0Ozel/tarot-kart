<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Pro Tarot Ritual v3</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #e2b04a;
    --gold-glow: rgba(226, 176, 74, 0.4);
    --bg: #050508;
  }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image: 
        radial-gradient(circle at 50% 50%, #1a1025 0%, #050508 100%),
        url('https://www.transparenttextures.com/patterns/stardust.png');
    color: white;
    font-family: 'Quicksand', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  /* --- SİHİRLİ İMLEÇ --- */
  #magic-cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 15px 5px white, 0 0 30px 10px var(--gold);
    z-index: 10000;
    mix-blend-mode: screen;
  }

  .sparkle {
    position: fixed;
    pointer-events: none;
    background: var(--gold);
    border-radius: 50%;
    z-index: 9999;
    animation: magic-fade 1s ease-out forwards;
  }

  @keyframes magic-fade {
    0% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
    100% { transform: scale(3) translateY(-50px); opacity: 0; filter: blur(4px); }
  }

  /* --- KART ALANI --- */
  .deck-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    height: 400px;
    perspective: 2000px;
    position: relative;
    width: 100%;
  }

  .card {
    width: 200px;
    height: 340px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
  }

  .inner-card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s;
  }

  .card.flip .inner-card {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 3px solid var(--gold);
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
  }

  /* Kart Arka Yüzü (Mistik Tasarım) */
  .front {
    background: #111;
    background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                      linear-gradient(135deg, #1a0a2a 0%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .front::before {
    content: "";
    width: 80%;
    height: 90%;
    border: 1px solid var(--gold-glow);
    position: absolute;
    border-radius: 8px;
  }

  .front-icon {
    font-size: 50px;
    color: var(--gold);
    filter: drop-shadow(0 0 15px var(--gold));
    animation: pulse 2s infinite ease-in-out;
  }

  /* Kart Ön Yüzü (Resim) */
  .back {
    transform: rotateY(180deg);
    background-size: cover;
    background-position: center;
    background-color: #000;
  }

  /* --- KARARIŞTIRMA ANİMASYONU --- */
  .card.shuffling {
    transition: all 0.5s ease-in-out !important;
  }

  /* --- ARAYÜZ --- */
  .interface {
    margin-top: 60px;
    text-align: center;
    z-index: 10;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold);
    letter-spacing: 8px;
    font-size: 2.8rem;
    margin: 0 0 20px 0;
    text-shadow: 0 0 20px rgba(226, 176, 74, 0.5);
  }

  #card-result {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold);
    font-size: 1.8rem;
    min-height: 40px;
    margin-bottom: 20px;
    opacity: 0;
    transition: 0.5s;
  }

  .btn-ritual {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    padding: 15px 45px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.4s;
  }

  .btn-ritual:hover {
    background: var(--gold);
    color: black;
    box-shadow: 0 0 30px var(--gold-glow);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

</style>
</head>
<body>

<div id="magic-cursor"></div>

<div class="interface">
  <h1>TAROT RİTÜELİ</h1>
  <div id="card-result"></div>
</div>

<div class="deck-container" id="stage">
  <div class="card" id="card-0" onclick="reveal(0)">
    <div class="inner-card">
      <div class="card-face front"><div class="front-icon">🕯️</div></div>
      <div class="card-face back" id="img-0"></div>
    </div>
  </div>
  <div class="card" id="card-1" onclick="reveal(1)">
    <div class="inner-card">
      <div class="card-face front"><div class="front-icon">🔮</div></div>
      <div class="card-face back" id="img-1"></div>
    </div>
  </div>
  <div class="card" id="card-2" onclick="reveal(2)">
    <div class="inner-card">
      <div class="card-face front"><div class="front-icon">🌙</div></div>
      <div class="card-face back" id="img-2"></div>
    </div>
  </div>
</div>

<div class="interface">
  <p id="status" style="color: #aaa; letter-spacing: 2px;">Zihnini boşalt ve odaklan...</p>
  <button class="btn-ritual" onclick="startRitual()">KARTLARI KARMIŞTIR</button>
</div>

<script>
const baseURL = "https://raw.githubusercontent.com/lenmorld/tarot-api/master/static/cards/";
const pool = [];

// TÜRKÇE VERİTABANI
const majorNames = ["Joker", "Büyücü", "Azize", "İmparatoriçe", "İmparator", "Aziz", "Aşıklar", "Araba", "Güç", "Ermiş", "Kader Çarkı", "Adalet", "Asılan Adam", "Ölüm", "Denge", "Şeytan", "Yıkılan Kule", "Yıldız", "Ay", "Güneş", "Mahkeme", "Dünya"];
const suits = [{e:"c", t:"Kupa"}, {e:"p", t:"Tılsım"}, {e:"s", t:"Kılıç"}, {e:"w", t:"Değnek"}];
const values = ["Ası", "İkilisi", "Üçlüsü", "Dörtlüsü", "Beşlisi", "Altılısı", "Yedilisi", "Sekizlisi", "Dokuzlusu", "Onlusu", "Prensi", "Şövalyesi", "Kraliçesi", "Kralı"];

majorNames.forEach((n, i) => pool.push({n, u: `${baseURL}m${i < 10 ? '0'+i : i}.jpg`}));
suits.forEach(s => values.forEach((v, i) => pool.push({n: `${s.t} ${v}`, u: `${baseURL}${s.e}${i+1 < 10 ? '0'+(i+1) : i+1}.jpg`})));

let activeDeck = [];
let isRitualActive = false;

// SİHİRLİ İMLEÇ
const mCursor = document.getElementById('magic-cursor');
document.addEventListener('mousemove', (e) => {
  mCursor.style.left = e.clientX + 'px';
  mCursor.style.top = e.clientY + 'px';
  
  if(Math.random() > 0.6) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = e.clientX + 'px';
    s.style.top = e.clientY + 'px';
    s.style.width = s.style.height = Math.random() * 6 + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
});

async function startRitual() {
  if(isRitualActive) return;
  isRitualActive = true;
  
  const cards = [document.getElementById('card-0'), document.getElementById('card-1'), document.getElementById('card-2')];
  const resultText = document.getElementById('card-result');
  const statusText = document.getElementById('status');
  
  resultText.style.opacity = 0;
  statusText.innerText = "Enerji toplanıyor...";
  cards.forEach(c => c.classList.remove('flip'));

  // --- GERÇEKÇİ KARIŞTIRMA ANİMASYONU ---
  
  // 1. Kartları ortada topla
  cards.forEach((c, idx) => {
    c.style.zIndex = 100;
    c.style.transform = `translateX(${idx === 0 ? '240px' : idx === 2 ? '-240px' : '0px'}) rotateZ(0deg)`;
  });

  await new Promise(r => setTimeout(r, 600));

  // 2. Karmaşık hareketler (3 Tur)
  for(let i=0; i<3; i++) {
    cards.forEach((c, idx) => {
      const randX = Math.random() * 100 - 50;
      const randY = Math.random() * 40 - 20;
      const randR = Math.random() * 20 - 10;
      c.style.transform = `translate(${idx === 0 ? 240+randX : idx === 2 ? -240+randX : randX}px, ${randY}px) rotateZ(${randR}deg) scale(1.05)`;
    });
    await new Promise(r => setTimeout(r, 400));
  }

  // 3. Kartları seç ve yerlerine gönder
  activeDeck = [];
  let used = new Set();
  while(activeDeck.length < 3) {
    let r = Math.floor(Math.random() * pool.length);
    if(!used.has(r)) { activeDeck.push(pool[r]); used.add(r); }
  }

  activeDeck.forEach((card, i) => {
    document.getElementById('img-'+i).style.backgroundImage = `url(${card.u})`;
  });

  cards.forEach(c => {
    c.style.transform = `translate(0,0) rotateZ(0deg)`;
  });

  statusText.innerText = "Kaderin belirlendi. Bir kart seç...";
  isRitualActive = false;
}

function reveal(i) {
  if(isRitualActive || activeDeck.length === 0) return;
  const c = document.getElementById('card-'+i);
  if(!c.classList.contains('flip')) {
    c.classList.add('flip');
    const res = document.getElementById('card-result');
    res.innerText = activeDeck[i].n;
    res.style.opacity = 1;
  }
}

// İlk açılış
window.onload = startRitual;
</script>

</body>
</html>
