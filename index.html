<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tarot Seçimi</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 50px;
}

.card {
  width: 100px;
  height: 150px;
  border-radius: 10px;
}

.blue { background: blue; }
.red { background: red; }
.yellow { background: gold; }

button {
  margin-top: 30px;
  padding: 10px 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🔮 Kartını Seç</h1>

<div class="cards">
  <div class="card blue"></div>
  <div class="card red"></div>
  <div class="card yellow"></div>
</div>

<button onclick="baslat()">Başlat</button>
<button onclick="durdur()">Durdur</button>

<script>
let interval;

function rastgeleRenk() {
  const renkler = ["blue", "red", "yellow"];
  return renkler[Math.floor(Math.random() * 3)];
}

function baslat() {
  interval = setInterval(() => {
    const kartlar = document.querySelectorAll(".card");

    kartlar.forEach(kart => {
      kart.className = "card " + rastgeleRenk();
    });

  }, 100);
}

function durdur() {
  clearInterval(interval);
}
</script>

</body>
</html>
