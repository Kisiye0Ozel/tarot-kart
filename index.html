<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistik Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --gold:#e8b84b; --gold2:#ffd700; --dim:rgba(255,255,255,0.42); }
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at 50% 25%,#200045 0%,#080012 65%,#000008 100%);
  min-height:100vh; color:#fff;
  font-family:'Cinzel',serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; cursor:none; user-select:none;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 7% 12%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 19% 48%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 79%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 54% 10%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 62%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 79% 30%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 77%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 44% 37%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 14%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 24% 91%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 71% 52%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 84%,rgba(255,255,255,.4) 0%,transparent 100%);
}
body::after{
  content:''; position:fixed;
  width:700px; height:700px; border-radius:50%;
  background:radial-gradient(circle,rgba(80,0,150,.18) 0%,transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:0;
  animation:orb 5s ease-in-out infinite;
}
@keyframes orb{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.9}}

#cur{position:fixed;width:13px;height:13px;background:var(--gold2);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:screen;transform:translate(-50%,-50%);box-shadow:0 0 10px 3px rgba(255,215,0,.7);}
.sp{position:fixed;width:4px;height:4px;background:var(--gold2);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);animation:spk .65s forwards ease-out;}
@keyframes spk{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}}

.title-wrap{position:relative;z-index:10;text-align:center;margin-bottom:10px;}
.title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.1rem,4.5vw,2rem);color:var(--gold);letter-spacing:10px;animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{text-shadow:0 0 15px rgba(232,184,75,.5),0 0 30px rgba(232,184,75,.2)}50%{text-shadow:0 0 30px rgba(232,184,75,1),0 0 70px rgba(232,184,75,.6),0 0 120px rgba(232,184,75,.3)}}
.sub{font-size:.58rem;color:var(--dim);letter-spacing:6px;margin-top:5px;}

.scene{position:relative;z-index:10;width:500px;height:330px;display:flex;align-items:center;justify-content:center;}
@media(max-width:540px){.scene{width:340px;height:250px;}}

/* PILE */
#pile{position:absolute;width:130px;height:210px;}
.pc{position:absolute;inset:0;border-radius:11px;border:1.5px solid rgba(232,184,75,.35);background:linear-gradient(145deg,#1a003a 0%,#0c0018 100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1);will-change:transform;}
.pc::before{content:'';position:absolute;inset:7px;border:1px solid rgba(232,184,75,.18);border-radius:7px;background:repeating-linear-gradient(45deg,transparent,transparent 7px,rgba(232,184,75,.04) 7px,rgba(232,184,75,.04) 8px);}
.pc::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;color:rgba(232,184,75,.12);}

/* SPREAD */
#spread{display:flex;gap:18px;align-items:center;opacity:0;pointer-events:none;transition:opacity .4s;}
#spread.on{opacity:1;pointer-events:auto;}

.cw{width:130px;height:210px;position:relative;transform-style:preserve-3d;cursor:pointer;transition:transform 1.3s cubic-bezier(.19,1,.22,1);animation:float 5s ease-in-out infinite;}
.cw:nth-child(1){animation-delay:0s;}
.cw:nth-child(2){animation-delay:.7s;}
.cw:nth-child(3){animation-delay:1.4s;}
@keyframes float{0%,100%{transform:translateY(0) rotateZ(-.5deg)}50%{transform:translateY(-12px) rotateZ(.5deg)}}
.cw.flipped{transform:rotateY(180deg) scale(1.07) !important;animation:none;}
.cw:not(.flipped):hover .cbk{border-color:rgba(232,184,75,.9);box-shadow:0 0 25px rgba(232,184,75,.4),0 0 50px rgba(130,0,255,.3);}

.cbk,.cfr{position:absolute;inset:0;border-radius:11px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1.5px solid rgba(232,184,75,.45);overflow:hidden;transition:box-shadow .3s,border-color .3s;}
.cbk{background:linear-gradient(145deg,#1a003a 0%,#0c0018 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.cbk::before{content:'';position:absolute;inset:7px;border:1px solid rgba(232,184,75,.2);border-radius:7px;}
.cbk::after{content:'';position:absolute;inset:11px;border-radius:5px;background:repeating-linear-gradient(45deg,transparent,transparent 7px,rgba(232,184,75,.04) 7px,rgba(232,184,75,.04) 8px);}
.bs{font-size:40px;color:rgba(232,184,75,.3);z-index:1;animation:bpulse 3s ease-in-out infinite;}
.cw:nth-child(2) .bs{animation-delay:1s;}
.cw:nth-child(3) .bs{animation-delay:2s;}
@keyframes bpulse{0%,100%{opacity:.3}50%{opacity:.65}}
.bn{font-size:.5rem;color:rgba(232,184,75,.22);letter-spacing:3px;z-index:1;}
.cfr{transform:rotateY(180deg);background:#05000f;}
.cfr svg{width:100%;height:100%;}

.info{position:relative;z-index:10;text-align:center;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;margin:8px 0;}
#cname{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,3.5vw,1.5rem);color:var(--gold);text-shadow:0 0 25px rgba(232,184,75,.8);letter-spacing:4px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;}
#cname.show{opacity:1;transform:translateY(0);}
#msg{font-size:.6rem;color:var(--dim);letter-spacing:4px;transition:opacity .25s;}

.bwrap{position:relative;z-index:10;}
button{background:transparent;color:var(--gold);border:1.5px solid rgba(232,184,75,.6);padding:13px 36px;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:5px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden;}
button::before{content:'';position:absolute;inset:-1px;background:var(--gold);z-index:-1;transform:scaleX(0);transform-origin:left;transition:transform .35s ease;}
button:hover::before{transform:scaleX(1);}
button:hover{color:#0a0015;box-shadow:0 0 35px rgba(232,184,75,.5);}
button:active{transform:scale(.97);}

.fp{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);animation:fpb .8s forwards ease-out;}
@keyframes fpb{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}}

@media(max-width:540px){
  .cw{width:95px;height:153px;}
  .cfr,.cbk{border-radius:9px;}
  #spread{gap:12px;}
  #pile{width:95px;height:153px;}
  .pc{border-radius:9px;}
  .bs{font-size:28px;}
}
</style>
</head>
<body>
<div id="cur"></div>

<div class="title-wrap">
  <div class="title">MİSTİK TAROT</div>
  <div class="sub">GEÇMİŞ &nbsp;·&nbsp; ŞİMDİ &nbsp;·&nbsp; GELECEK</div>
</div>

<div class="scene">
  <div id="pile">
    <div class="pc" id="p4"></div><div class="pc" id="p3"></div>
    <div class="pc" id="p2"></div><div class="pc" id="p1"></div>
    <div class="pc" id="p0"></div>
  </div>
  <div id="spread">
    <div class="cw" id="cw0" onclick="flip(0)">
      <div class="cbk"><span class="bs">☽</span><span class="bn">I</span></div>
      <div class="cfr" id="cf0"></div>
    </div>
    <div class="cw" id="cw1" onclick="flip(1)">
      <div class="cbk"><span class="bs">☀</span><span class="bn">II</span></div>
      <div class="cfr" id="cf1"></div>
    </div>
    <div class="cw" id="cw2" onclick="flip(2)">
      <div class="cbk"><span class="bs">✦</span><span class="bn">III</span></div>
      <div class="cfr" id="cf2"></div>
    </div>
  </div>
</div>

<div class="info">
  <div id="cname"></div>
  <div id="msg">Gözlerini kapat ve odaklan...</div>
</div>
<div class="bwrap">
  <button onclick="shuffle()">✦ &nbsp; KADERİ KARIŞTIR &nbsp; ✦</button>
</div>

<script>
/* CURSOR */
const $cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{
  $cur.style.left=e.clientX+'px'; $cur.style.top=e.clientY+'px';
  if(Math.random()>.65){
    const s=document.createElement('div'); s.className='sp';
    const dx=(Math.random()-.5)*50,dy=(Math.random()-.5)*50;
    s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--dx:${dx}px;--dy:${dy}px`;
    document.body.appendChild(s); setTimeout(()=>s.remove(),700);
  }
});

/* ─── SVG CARD ART ─── */
// Each card returns an SVG string 130×210
function cardSVG(card) {
  const {color, symbol, title, lines, bg1, bg2} = card;
  const linesHTML = lines.map((l,i)=>`<text x="65" y="${138+i*14}" text-anchor="middle" font-size="8" fill="${color}" opacity=".7" font-family="serif">${l}</text>`).join('');
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 210">
  <defs>
    <radialGradient id="bg${card.id}" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="${bg1}"/>
      <stop offset="100%" stop-color="${bg2}"/>
    </radialGradient>
    <radialGradient id="glow${card.id}" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${color}" stop-opacity=".4"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- BG -->
  <rect width="130" height="210" rx="9" fill="url(#bg${card.id})"/>
  <!-- Glow circle -->
  <ellipse cx="65" cy="90" rx="50" ry="50" fill="url(#glow${card.id})"/>
  <!-- Border -->
  <rect x="5" y="5" width="120" height="200" rx="7" fill="none" stroke="${color}" stroke-width="1" opacity=".5"/>
  <rect x="10" y="10" width="110" height="190" rx="5" fill="none" stroke="${color}" stroke-width=".5" opacity=".25"/>
  <!-- Corner Roman -->
  <text x="16" y="25" font-size="9" fill="${color}" opacity=".6" font-family="serif">${card.roman}</text>
  <text x="114" y="195" font-size="9" fill="${color}" opacity=".6" font-family="serif" text-anchor="end">${card.roman}</text>
  <!-- Main symbol -->
  <text x="65" y="110" text-anchor="middle" font-size="52" fill="${color}" opacity=".9">${symbol}</text>
  <!-- Decorative dots -->
  ${[0,1,2,3].map(i=>`<circle cx="${20+i*30}" cy="35" r="1.5" fill="${color}" opacity=".3"/>`).join('')}
  ${[0,1,2,3].map(i=>`<circle cx="${20+i*30}" cy="178" r="1.5" fill="${color}" opacity=".3"/>`).join('')}
  <!-- Title -->
  <text x="65" y="165" text-anchor="middle" font-size="8.5" fill="${color}" font-family="serif" letter-spacing="1" font-weight="bold">${title}</text>
  <!-- Subtitle lines -->
  ${linesHTML}
  <!-- Stars -->
  <text x="65" y="194" text-anchor="middle" font-size="7" fill="${color}" opacity=".4">✦ ✦ ✦</text>
</svg>`;
}

/* ─── DECK DATA ─── */
// 78 cards, each with a visual archetype
const PALETTE = {
  gold:   {color:'#e8c84b',bg1:'#1a0a00',bg2:'#0c0400'},
  silver: {color:'#c8d8e8',bg1:'#001428',bg2:'#000810'},
  crimson:{color:'#e85050',bg1:'#200010',bg2:'#0c0008'},
  emerald:{color:'#50d880',bg1:'#001a08',bg2:'#000c04'},
  violet: {color:'#c878f8',bg1:'#150020',bg2:'#080010'},
  azure:  {color:'#60b8f8',bg1:'#001828',bg2:'#000c14'},
  amber:  {color:'#f89840',bg1:'#180800',bg2:'#0c0400'},
  rose:   {color:'#f870a0',bg1:'#180010',bg2:'#0c0008'},
  teal:   {color:'#40d8c8',bg1:'#001818',bg2:'#000c0c'},
};

const ROMAN=['0','I','II','III','IV','V','VI','VII','VIII','IX','X',
             'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];

const MAJOR = [
  {n:"Deli",      sym:'🌟', pal:'gold',   lines:['Özgürlük','Macera']},
  {n:"Büyücü",    sym:'⚗',  pal:'violet', lines:['İrade','Güç']},
  {n:"Yüce Rahibe",sym:'☽', pal:'silver', lines:['Gizem','Sezgi']},
  {n:"İmparatoriçe",sym:'♀',pal:'emerald',lines:['Bereket','Doğa']},
  {n:"İmparator", sym:'♦',  pal:'crimson',lines:['Otorite','Düzen']},
  {n:"Hiyerofant",sym:'✙',  pal:'gold',   lines:['Gelenek','Bilgelik']},
  {n:"Âşıklar",   sym:'♡',  pal:'rose',   lines:['Bağlantı','Seçim']},
  {n:"Savaş Arabası",sym:'⚔',pal:'azure', lines:['Zafer','Kontrol']},
  {n:"Güç",       sym:'∞',  pal:'amber',  lines:['Cesaret','Sabır']},
  {n:"Ermiş",     sym:'🔦', pal:'silver', lines:['Yalnızlık','Rehberlik']},
  {n:"Kader Çarkı",sym:'⊕', pal:'gold',   lines:['Döngü','Şans']},
  {n:"Adalet",    sym:'⚖',  pal:'azure',  lines:['Denge','Hakikat']},
  {n:"Asılan Adam",sym:'⊻', pal:'teal',   lines:['Fedakarlık','Duraklama']},
  {n:"Ölüm",      sym:'✗',  pal:'violet', lines:['Dönüşüm','Son']},
  {n:"Denge",     sym:'🜂',  pal:'silver', lines:['Uyum','Sabır']},
  {n:"Şeytan",    sym:'Ψ',  pal:'crimson',lines:['Bağ','Gölge']},
  {n:"Yıkılan Kule",sym:'⚡',pal:'amber', lines:['Yıkım','Uyanış']},
  {n:"Yıldız",    sym:'★',  pal:'azure',  lines:['Umut','Ilham']},
  {n:"Ay",        sym:'☾',  pal:'silver', lines:['Yanılsama','Korku']},
  {n:"Güneş",     sym:'☀',  pal:'gold',   lines:['Neşe','Başarı']},
  {n:"Yargılama", sym:'🎺', pal:'violet', lines:['Uyanış','Çağrı']},
  {n:"Dünya",     sym:'⊕',  pal:'emerald',lines:['Tamamlanma','Bütünlük']},
];

const SUITS = [
  {t:'Kupa',   sym:'♡', pal:'rose',   e:'c'},
  {t:'Tılsım', sym:'★', pal:'gold',   e:'p'},
  {t:'Kılıç',  sym:'⚔', pal:'azure',  e:'s'},
  {t:'Değnek', sym:'🌿',pal:'emerald',e:'w'},
];
const RANKS = ['Ası','İkilisi','Üçlüsü','Dörtlüsü','Beşlisi','Altılısı',
               'Yedilisi','Sekizlisi','Dokuzlusu','Onlusu','Ulağı','Şövalyesi','Kraliçesi','Kralı'];

let DECK = [];
let idCount = 0;

MAJOR.forEach((m,i)=>{
  const p = PALETTE[m.pal];
  DECK.push(cardSVG({id:idCount++, color:p.color, symbol:m.sym, title:m.n,
    lines:m.lines, bg1:p.bg1, bg2:p.bg2, roman:ROMAN[i]}));
});

SUITS.forEach(s=>{
  RANKS.forEach((r,i)=>{
    const p = PALETTE[s.pal];
    const rv = i<10 ? String(i+1) : ['U','Ş','K','KR'][i-10];
    DECK.push(cardSVG({id:idCount++, color:p.color, symbol:s.sym,
      title:`${s.t} ${r}`, lines:[s.t], bg1:p.bg1, bg2:p.bg2, roman:rv}));
  });
});

/* STATE */
let selected=[], flipped=[false,false,false], busy=false;

/* SHUFFLE */
function shuffle(){
  if(busy)return; busy=true;
  const spread=document.getElementById('spread');
  const pile=document.getElementById('pile');
  const cards=pile.querySelectorAll('.pc');

  document.getElementById('cname').className='';
  document.getElementById('cname').textContent='';
  setMsg('Ruhlar fısıldıyor...');
  flipped=[false,false,false];
  spread.classList.remove('on');
  pile.style.opacity='1'; pile.style.pointerEvents='none';

  cards.forEach((c,i)=>{
    const dx=(i-2)*2,dy=(i-2)*1.5,rot=(i-2)*1.5;
    c.style.transition='none';
    c.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
  });

  let round=0;
  function riffle(){
    if(round>=5){finish();return;}
    cards.forEach((c,i)=>{
      setTimeout(()=>{
        const side=(i%2===0)?-1:1;
        const sx=42+Math.random()*18, ly=-32-Math.random()*12, rot=side*(7+Math.random()*8);
        c.style.transition=`transform .2s cubic-bezier(.34,1.56,.64,1)`;
        c.style.transform=`translateX(${side*sx}px) translateY(${ly}px) rotate(${rot}deg)`;
        setTimeout(()=>{
          const nx=(Math.random()-.5)*8,ny=(Math.random()-.5)*6,nr=(Math.random()-.5)*3;
          c.style.transition=`transform .16s ease`;
          c.style.transform=`translate(${nx}px,${ny}px) rotate(${nr}deg)`;
        },230);
      },i*75);
    });
    round++;
    setTimeout(riffle,(cards.length*75)+440);
  }
  riffle();

  function finish(){
    selected=[];
    const used=new Set();
    while(selected.length<3){
      const r=Math.floor(Math.random()*DECK.length);
      if(!used.has(r)){selected.push({svg:DECK[r],idx:r});used.add(r);}
    }
    // Figure out the card name from SVG title text
    selected.forEach((s,i)=>{
      const m=s.svg.match(/font-weight="bold">([^<]+)<\/text>/);
      s.name = m ? m[1] : '?';
      document.getElementById('cf'+i).innerHTML=s.svg;
      document.getElementById('cw'+i).classList.remove('flipped');
    });
    setTimeout(()=>{
      pile.style.transition='opacity .3s';
      pile.style.opacity='0';
      setTimeout(()=>{
        pile.style.opacity='1'; pile.style.pointerEvents='';
        cards.forEach((c,i)=>{
          const dx=(i-2)*2,dy=(i-2)*1.5,rot=(i-2)*1.5;
          c.style.transition='none';
          c.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
        });
        spread.classList.add('on');
        setMsg('Kaderini seç...');
        busy=false;
      },350);
    },200);
  }
}

/* FLIP */
function flip(i){
  if(busy||selected.length===0||flipped[i])return;
  flipped[i]=true;
  const cw=document.getElementById('cw'+i);
  const rect=cw.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let p=0;p<14;p++){
    const el=document.createElement('div'); el.className='fp';
    const ang=(p/14)*Math.PI*2, dist=55+Math.random()*70;
    const cols=['#ffd700','#ffffff','#cc88ff','#e8b84b'];
    el.style.cssText=`left:${cx}px;top:${cy}px;--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;background:${cols[p%cols.length]};animation-duration:${.5+Math.random()*.4}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);
  }
  cw.classList.add('flipped');
  const nm=document.getElementById('cname');
  nm.classList.remove('show'); nm.textContent=selected[i].name;
  requestAnimationFrame(()=>requestAnimationFrame(()=>nm.classList.add('show')));
  const done=flipped.every(Boolean);
  setMsg(done?'Yıldızlar konuştu...':(flipped.filter(Boolean).length===1?'İki kart daha...':'Son kart...'));
}

function setMsg(t){
  const el=document.getElementById('msg');
  el.style.opacity='0';
  setTimeout(()=>{el.textContent=t;el.style.opacity='1';},220);
}

window.onload=shuffle;
</script>
</body>
</html>
