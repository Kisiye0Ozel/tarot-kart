<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tarot Seçimi</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0f0f2d, #000);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 30px;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 40px;
}

.card {
  width: 70px;
  height: 110px;
  border-radius: 8px;
  background: linear-gradient(45deg, purple, black);
  transition: transform 0.2s;
}

.card.active {
  transform: scale(1.3);
  box-shadow: 0 0 20px gold;
}

button {
  margin-top: 30px;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🔮 Kartını Seç</h1>

<div class="cards" id="cards"></div>

<button onclick="baslat()">Karıştır</button>
<button onclick="durdur()">Durdur</button>

<script>
// 🔥 30 tane kart oluşturuyoruz
const kartSayisi = 30;
const container = document.getElementById("cards");

for (let i = 0; i < kartSayisi; i++) {
  const div = document.createElement("div");
  div.classList.add("card");
  container.appendChild(div);
}

let interval;
let aktifIndex = 0;

function baslat() {
  const kartlar = document.querySelectorAll(".card");

  interval = setInterval(() => {
    kartlar.forEach(k => k.classList.remove("active"));

    aktifIndex = Math.floor(Math.random() * kartlar.length);
    kartlar[aktifIndex].classList.add("active");

  }, 80); // hız (daha düşük = daha hızlı)
}

function durdur() {
  clearInterval(interval);
}
</script>

</body>
</html>
