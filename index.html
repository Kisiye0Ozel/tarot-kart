<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek Tarot</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a0033, #000);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 20px;
}

#card {
  width: 200px;
  height: 320px;
  margin: 30px auto;
  background-size: cover;
  border-radius: 12px;
  box-shadow: 0 0 25px purple;
  transition: transform 0.3s;
}

#card.active {
  transform: scale(1.1);
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🔮 Kartını Seç</h1>

<div id="card"></div>

<button onclick="baslat()">Karıştır</button>
<button onclick="durdur()">Kartı Aç</button>

<script>

// 🔥 GERÇEK TAROT KARTLARI (örnek, sen 78'e tamamlayabilirsin)
const kartlar = [
  {
    isim: "The Fool",
    resim: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg"
  },
  {
    isim: "The Magician",
    resim: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg"
  },
  {
    isim: "The High Priestess",
    resim: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg"
  },
  {
    isim: "The Empress",
    resim: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg"
  },
  {
    isim: "The Emperor",
    resim: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg"
  },
  {
    isim: "The Sun",
    resim: "https://upload.wikimedia.org/wikipedia/commons/1/17/TheSun.jpg"
  },
  {
    isim: "Death",
    resim: "https://upload.wikimedia.org/wikipedia/commons/d/d7/Death.jpg"
  }
];

let interval;

function baslat() {
  interval = setInterval(() => {
    const random = kartlar[Math.floor(Math.random() * kartlar.length)];
    const cardDiv = document.getElementById("card");

    cardDiv.style.backgroundImage = `url(${random.resim})`;
    cardDiv.classList.add("active");

  }, 100);
}

function durdur() {
  clearInterval(interval);
}

</script>

</body>
</html>
