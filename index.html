<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistik Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #e8b84b;
  --gold-bright: #ffd700;
  --gold-dim: rgba(232, 184, 75, 0.3);
  --text-dim: rgba(255,255,255,0.45);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(ellipse at 50% 30%, #1e0040 0%, #0a0015 60%, #000008 100%);
  min-height: 100vh;
  color: white;
  font-family: 'Cinzel', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: none;
  user-select: none;
}

/* Yıldız Arka Planı */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 8% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 82%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 68% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.6) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* Aura Efekti */
body::after {
  content: '';
  position: fixed;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(90,0,160,0.18) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
  animation: orb 5s ease-in-out infinite;
}

@keyframes orb {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.5; }
  50% { transform: translate(-50%,-50%) scale(1.3); opacity:0.9; }
}

/* CURSOR */
#cursor {
  position: fixed;
  width: 14px; height: 14px;
  background: var(--gold-bright);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: screen;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 12px 3px rgba(255,215,0,0.7);
}

.sparkle {
  position: fixed;
  width: 4px; height: 4px;
  background: var(--gold-bright);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  animation: sp 0.7s forwards ease-out;
}

@keyframes sp {
  0% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity:0; }
}

/* TITLE */
.title-wrap { position: relative; z-index: 10; text-align: center; margin-bottom: 12px; }
.title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.1rem, 4.5vw, 2rem);
  color: var(--gold);
  letter-spacing: 10px;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%,100% { text-shadow: 0 0 15px rgba(232,184,75,0.5); }
  50% { text-shadow: 0 0 30px rgba(232,184,75,1), 0 0 70px rgba(232,184,75,0.4); }
}

.subtitle { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 6px; margin-top: 5px; }

/* SCENE */
.scene {
  position: relative; z-index: 10;
  width: 500px; height: 320px;
  display: flex; align-items: center; justify-content: center;
}

/* PILE (Deste) */
#pile { position: absolute; width: 130px; height: 210px; transition: opacity 0.3s; }
.pc {
  position: absolute; inset: 0; border-radius: 11px;
  border: 1.5px solid rgba(232,184,75,0.35);
  background: linear-gradient(145deg, #1a003a 0%, #0c0018 100%);
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

/* SPREAD (Açılan Kartlar) */
#spread { display: flex; gap: 18px; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
#spread.on { opacity: 1; pointer-events: auto; }

.cw {
  width: 130px; height: 210px; position: relative;
  transform-style: preserve-3d; cursor: pointer;
  transition: transform 1.3s cubic-bezier(0.19,1,0.22,1);
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.cw.flipped { transform: rotateY(180deg) scale(1.07) !important; animation: none; }

.cf, .cb {
  position: absolute; inset: 0; border-radius: 11px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border: 1.5px solid rgba(232,184,75,0.45); overflow: hidden;
}

.cb {
  background: linear-gradient(145deg, #1a003a 0%, #0c0018 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

.bs { font-size: 42px; color: rgba(232,184,75,0.3); animation: bpulse 3s infinite; }
@keyframes bpulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

.cf { transform: rotateY(180deg); background: #050010; }
.cf img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

.cf .loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #0a0020;
}
.cf .loading::after { content: '✦'; animation: spin 1.8s linear infinite; color: var(--gold); }
@keyframes spin { to { transform: rotate(360deg); } }

.cf .lbl {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 5px 5px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  font-size: 0.55rem; text-align: center; color: var(--gold);
}

/* BUTTON */
button {
  background: transparent; color: var(--gold); border: 1.5px solid var(--gold);
  padding: 12px 30px; font-family: 'Cinzel'; cursor: pointer; letter-spacing: 3px;
  transition: 0.3s; z-index: 100; position: relative;
}
button:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

/* Particles */
.fp { position: fixed; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; animation: fpburst 0.8s forwards; }
@keyframes fpburst { 
  0% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity:0; }
}

@media (max-width: 540px) { .cw { width: 90px; height: 145px; } #spread { gap: 10px; } }
</style>
</head>
<body>

<div id="cursor"></div>

<div class="title-wrap">
  <div class="title">MİSTİK TAROT</div>
  <div class="subtitle">GEÇMİŞ &nbsp;·&nbsp; ŞİMDİ &nbsp;·&nbsp; GELECEK</div>
</div>

<div class="scene">
  <div id="pile">
    <div class="pc" style="transform: rotate(-2deg)"></div>
    <div class="pc" style="transform: rotate(1deg) translate(2px, 2px)"></div>
    <div class="pc" id="p_top"></div>
  </div>

  <div id="spread">
    <div class="cw" id="cw0" onclick="flipCard(0)"><div class="cb"><span class="bs">☽</span></div><div class="cf" id="cf0"><div class="loading"></div><img id="img0"/><div class="lbl" id="lbl0"></div></div></div>
    <div class="cw" id="cw1" onclick="flipCard(1)"><div class="cb"><span class="bs">☀</span></div><div class="cf" id="cf1"><div class="loading"></div><img id="img1"/><div class="lbl" id="lbl1"></div></div></div>
    <div class="cw" id="cw2" onclick="flipCard(2)"><div class="cb"><span class="bs">✦</span></div><div class="cf" id="cf2"><div class="loading"></div><img id="img2"/><div class="lbl" id="lbl2"></div></div></div>
  </div>
</div>

<div class="info" style="margin-top: 20px; text-align: center; min-height: 50px;">
  <div id="cname" style="color: var(--gold); font-size: 1.2rem; margin-bottom: 5px;"></div>
  <div id="msg" style="color: var(--text-dim); font-size: 0.7rem;">Kaderini karıştır...</div>
</div>

<div class="bwrap" style="margin-top: 20px;">
  <button onclick="shuffleDeck()">KADERİ KARIŞTIR</button>
</div>

<script>
const $cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  $cur.style.left = e.clientX + 'px';
  $cur.style.top = e.clientY + 'px';
  if (Math.random() > 0.7) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const dx = (Math.random()-0.5)*60, dy = (Math.random()-0.5)*60;
    s.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;--dx:${dx}px;--dy:${dy}px`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
});

const MAJORS = ["Deli","Büyücü","Yüce Rahibe","İmparatoriçe","İmparator","Hiyerofant","Âşıklar","Savaş Arabası","Güç","Ermiş","Kader Çarkı","Adalet","Asılan Adam","Ölüm","Denge","Şeytan","Yıkılan Kule","Yıldız","Ay","Güneş","Yargılama","Dünya"];
const SUITS = [{e:"c",t:"Kupa"},{e:"p",t:"Tılsım"},{e:"s",t:"Kılıç"},{e:"w",t:"Değnek"}];
const RANKS = ["Ası","İkilisi","Üçlüsü","Dörtlüsü","Beşlisi","Altılısı","Yedilisi","Sekizlisi","Dokuzlusu","Onlusu","Ulağı","Şövalyesi","Kraliçesi","Kralı"];

const DECK = MAJORS.map((n,i) => ({n, f:`m${String(i).padStart(2,'0')}`}));
SUITS.forEach(s => RANKS.forEach((r,i) => DECK.push({n:`${s.t} ${r}`, f:`${s.e}${String(i+1).padStart(2,'0')}`})));

// GÖRSEL KAYNAKLARI (En stabil olanlar en üstte)
const SRCS = [
  f => `https://tarot-api-seven.vercel.app/static/cards/${f}.jpg`,
  f => `https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/${f}.jpg`,
  f => `https://cdn.jsdelivr.net/gh/haydenull/tarot-api@main/static/cards/${f}.jpg`
];

function tryLoadImg(idx, filename, si) {
  if (si >= SRCS.length) return;
  const img = document.getElementById('img'+idx);
  img.onerror = () => tryLoadImg(idx, filename, si + 1);
  img.onload = () => {
    document.querySelector(`#cf${idx} .loading`).style.display = 'none';
    img.style.display = 'block';
  };
  img.src = SRCS[si](filename);
}

let selected = [], flipped = [false,false,false], busy = false;

function shuffleDeck() {
  if (busy) return;
  busy = true;
  flipped = [false,false,false];
  document.getElementById('msg').textContent = "Kader karıştırılıyor...";
  document.getElementById('cname').textContent = "";
  document.getElementById('spread').classList.remove('on');
  document.getElementById('pile').style.opacity = "1";

  // Rastgele 3 kart seç
  selected = [];
  let used = new Set();
  while(selected.length < 3) {
    let r = Math.floor(Math.random() * DECK.length);
    if(!used.has(r)) { selected.push(DECK[r]); used.add(r); }
  }

  // Kartları hazırla
  for(let i=0; i<3; i++) {
    const cw = document.getElementById('cw'+i);
    cw.classList.remove('flipped');
    document.getElementById('img'+i).style.display = 'none';
    document.querySelector(`#cf${i} .loading`).style.display = 'flex';
    document.getElementById('lbl'+i).textContent = selected[i].n;
    tryLoadImg(i, selected[i].f, 0);
  }

  setTimeout(() => {
    document.getElementById('pile').style.opacity = "0";
    document.getElementById('spread').classList.add('on');
    document.getElementById('msg').textContent = "Bir kart seç...";
    busy = false;
  }, 1200);
}

function flipCard(i) {
  if (busy || flipped[i]) return;
  flipped[i] = true;
  document.getElementById('cw'+i).classList.add('flipped');
  document.getElementById('cname').textContent = selected[i].n;
  
  // Patlama efekti
  const rect = document.getElementById('cw'+i).getBoundingClientRect();
  for (let p = 0; p < 12; p++) {
    const el = document.createElement('div');
    el.className = 'fp';
    const ang = (p/12)*Math.PI*2;
    const dist = 40 + Math.random()*50;
    el.style.cssText = `left:${rect.left + rect.width/2}px;top:${rect.top + rect.height/2}px;--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;background:var(--gold)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

window.onload = shuffleDeck;
</script>
</body>
</html>
