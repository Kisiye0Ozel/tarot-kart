<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Divine Tarot Ritual</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #ffcc33;
    --gold-bright: #fff5d7;
    --bg-dark: #050508;
    --mystic-glow: rgba(255, 204, 51, 0.2);
  }

  body {
    margin: 0; padding: 0;
    background: radial-gradient(circle at center, #1a0a2e 0%, #050508 100%);
    color: white;
    font-family: 'Cinzel Decorative', serif;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; cursor: none;
  }

  /* --- SİHİRLİ ASANIN İZİ --- */
  #cursor {
    position: fixed; width: 10px; height: 10px; background: white;
    border-radius: 50%; pointer-events: none; z-index: 10000;
    box-shadow: 0 0 20px 5px var(--gold), 0 0 40px 10px white;
  }
  .particle {
    position: fixed; pointer-events: none; border-radius: 50%;
    z-index: 9999; animation: fly 1.2s linear forwards;
  }
  @keyframes fly {
    0% { transform: scale(1) translate(0,0); opacity: 1; }
    100% { transform: scale(0) translate(var(--x), var(--y)); opacity: 0; }
  }

  /* --- UI ELEMENTS --- */
  .header { text-align: center; margin-bottom: 50px; z-index: 10; }
  h1 { font-size: 3.5rem; letter-spacing: 15px; margin: 0; color: var(--gold); text-shadow: 0 0 30px var(--gold); }
  #card-name { font-family: 'Parisienne', cursive; font-size: 2.5rem; color: var(--gold-bright); min-height: 60px; margin-top: 10px; transition: 0.5s; }

  /* --- 3D KART SİSTEMİ --- */
  .stage {
    display: flex; gap: 60px; perspective: 2000px; height: 380px; align-items: center;
  }
  .card {
    width: 220px; height: 360px; position: relative; cursor: pointer;
    transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .card:hover { transform: translateY(-20px) scale(1.05) rotateX(10deg); }
  
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }

  .face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 15px;
    border: 3px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.9);
  }
  
  /* Kart Arkası: Şahvetli Desen */
  .back {
    background: #000;
    background-image: 
      repeating-conic-gradient(from 0deg, #1a0a2e 0deg 30deg, #050508 30deg 60deg);
    display: flex; align-items: center; justify-content: center;
  }
  .back::after {
    content: "❂"; font-size: 80px; color: var(--gold);
    filter: drop-shadow(0 0 20px var(--gold)); opacity: 0.6;
  }

  .front {
    transform: rotateY(180deg); background-size: cover; background-position: center;
  }

  /* --- KARIŞTIRMA BUTONU --- */
  .btn-container { margin-top: 50px; }
  button {
    background: transparent; border: 2px solid var(--gold); color: var(--gold);
    padding: 20px 60px; font-family: 'Cinzel Decorative'; font-size: 1.2rem;
    letter-spacing: 5px; cursor: pointer; transition: 0.4s; position: relative;
    overflow: hidden;
  }
  button:hover { background: var(--gold); color: black; box-shadow: 0 0 50px var(--gold); }

</style>
</head>
<body>

<div id="cursor"></div>

<div class="header">
  <h1>KADERİN RİTÜELİ</h1>
  <div id="card-name"></div>
</div>

<div class="stage" id="stage">
  <div class="card" onclick="reveal(0)"><div class="card-inner"><div class="face back"></div><div class="face front" id="f0"></div></div></div>
  <div class="card" onclick="reveal(1)"><div class="card-inner"><div class="face back"></div><div class="face front" id="f1"></div></div></div>
  <div class="card" onclick="reveal(2)"><div class="card-inner"><div class="face back"></div><div class="face front" id="f2"></div></div></div>
</div>

<div class="btn-container">
  <button onclick="shuffle()">RİTÜELİ BAŞLAT</button>
</div>

<script>
const baseURL = "https://raw.githubusercontent.com/lenmorld/tarot-api/master/static/cards/";
const pool = [];
const major = ["Joker", "Büyücü", "Azize", "İmparatoriçe", "İmparator", "Aziz", "Aşıklar", "Araba", "Güç", "Ermiş", "Kader Çarkı", "Adalet", "Asılan Adam", "Ölüm", "Denge", "Şeytan", "Yıkılan Kule", "Yıldız", "Ay", "Güneş", "Mahkeme", "Dünya"];
const suits = [{e:"c", t:"Kupa"}, {e:"p", t:"Tılsım"}, {e:"s", t:"Kılıç"}, {e:"w", t:"Değnek"}];
const nums = ["Ası", "İkilisi", "Üçlüsü", "Dörtlüsü", "Beşlisi", "Altılısı", "Yedilisi", "Sekizlisi", "Dokuzlusu", "Onlusu", "Prensi", "Şövalyesi", "Kraliçesi", "Kralı"];

major.forEach((n, i) => pool.push({n, u: `${baseURL}m${i < 10 ? '0'+i : i}.jpg`}));
suits.forEach(s => nums.forEach((v, i) => pool.push({n: `${s.t} ${v}`, u: `${baseURL}${s.e}${i+1 < 10 ? '0'+(i+1) : i+1}.jpg`})));

let drawn = [];
let isBusy = false;

// SİHİRLİ İMLEÇ & PARÇACIKLAR
document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX + 'px';
  c.style.top = e.clientY + 'px';
  
  for(let i=0; i<2; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    p.style.width = p.style.height = Math.random() * 5 + 'px';
    p.style.background = Math.random() > 0.5 ? '#ffcc33' : 'white';
    p.style.setProperty('--x', (Math.random() - 0.5) * 100 + 'px');
    p.style.setProperty('--y', (Math.random() - 0.5) * 100 + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
});

async function shuffle() {
  if(isBusy) return;
  isBusy = true;
  document.getElementById('card-name').innerText = "Ruhlar çağrılıyor...";
  const cards = document.querySelectorAll('.card');
  cards.forEach(c => c.classList.remove('flipped'));

  // ŞAHVETLİ KARIŞTIRMA ANİMASYONU
  for(let i=0; i<8; i++) {
    cards.forEach((c, idx) => {
      const x = (Math.random() - 0.5) * 400;
      const y = (Math.random() - 0.5) * 100;
      const r = (Math.random() - 0.5) * 40;
      c.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg) scale(1.1)`;
    });
    await new Promise(r => setTimeout(r, 150));
  }

  drawn = [];
  let used = new Set();
  while(drawn.length < 3) {
    let r = Math.floor(Math.random() * pool.length);
    if(!used.has(r)) { drawn.push(pool[r]); used.add(r); }
  }

  drawn.forEach((c, i) => document.getElementById('f'+i).style.backgroundImage = `url(${c.u})`);
  cards.forEach(c => c.style.transform = "");
  document.getElementById('card-name').innerText = "Üç mühürden birini seç...";
  isBusy = false;
}

function reveal(i) {
  if(isBusy || drawn.length === 0) return;
  const c = document.querySelectorAll('.card')[i];
  if(!c.classList.contains('flipped')) {
    c.classList.add('flipped');
    document.getElementById('card-name').innerText = drawn[i].n;
  }
}

window.onload = shuffle;
</script>

</body>
</html>
